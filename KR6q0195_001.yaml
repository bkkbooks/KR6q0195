body:
  text: 妙峰山後學沙門周理編滇南無學居士陶珙閲禪宗唐聖師李成眉賢者中天竺人也受般若多羅之後長慶間遊化至大理國大弘祖道昭成王禮為師為建崇聖寺基方七里塔高三百餘尺後王嵯巔問曰三尊佛那尊大師應聲曰中尊是我王不契以師為狂流於緬未幾滅度冢間常有光明復生靈芝大如傘蓋有盜者盜其骨商人貨之乃金鎖骨也王聞其事取骨為中尊臟腹志云師乃西天三祖商那和修後身也唐大理崇聖買順禪師葉榆人也幼志不群常慕空宗從李成眉賢者雉染屢有省發賢者語師曰佛心宗傳震旦數世矣汝可往秉承於是走大方見天皇悟和尚問如何是玄妙義悟曰莫道我解佛法好曰爭奈學人疑滯何悟曰何不問老僧曰即今問了也悟曰去是汝棲泊處師不覺點頭悟曰汝徹矣師遽以手作掩悟口勢悟曰西南佛法自子行矣是時百丈南泉諸大宗師法席頗盛師遍歷參承咸蒙印可六祖之道傳雲南自師為始唐禪陀子西域人也初隨李賢者至大理賢欲建寺命師西天畫祗園精舍圖師朝去暮回以圖呈賢者者曰還將得靈鷲山圖來麼曰將得來者曰在甚麼處子繞賢者一匝而出唐些島師有神通侍李賢者至大理與買順禪陀子為友是時南詔奉佛賢者徒衆千人惟買順與師深契焉及賢者入緬師侍行歸寂師開永昌龍泉寺後入交趾大行教化不知所終晉弘修大師即文經帝禪位為僧也神聖文武帝之子姓段氏名思英為太子時隨父王入僧寺問寺僧曰佛是何方人曰西天問西天在何處曰佛生處曰這裏聻曰佛住處便微笑無意於世請為僧帝不許遂即位未幾讓位與叔思良雉染焉附録按南詔史載段氏王雲南三百五十年歷二十二帝其中禪位為僧者七人曰文經曰秉義曰孝德曰保定曰文安曰宣仁曰正康第六代昭明帝有述傳燈録續雲南得道者作一書豫未之見宋水目山淨妙德澄禪師滇池人也因讀楞嚴至見猶離見見不能及處有省後見黃龍南禪師因問農家自有同風事如何是同風事師良久澄曰恁麼則起動和尚去也師曰靈利人難得澄禮拜遂辭歸雲南開水目山南詔為建梵剎諡為淨妙禪師宋東山普濟慶光禪師姚安人也因問淨妙禪師宗門中事師云道甚麼光擬開口師便起身入方丈光大悟初開妙光寺卓錫湧泉次同淨妙禪師開水目山及師領衆六詔諸王咸往問法入滅於東山塔於水目段氏諡為普濟慶光禪師宋水目山皎淵月禪師姓高氏大理國段氏國公也問濟禪師如何免得生死濟曰把將生死來公擬議師以扇打棹一下公有省後祝髮為僧住水目臨終書偈云諸法因緣生我説是因緣因緣盡故滅我作如是説擲筆而化塔于本山宋水目山阿標頭陀洱海人也問皎淵禪師心經無智亦無得師曰你但恁麼參去看是甚道理時南詔段氏建寺師為工匠都養日則奔走勞苦夜則繫髻寺梁遂獲靈通嘗挈筐入市貨物雖去二百里者食頃便至人竊窺之但見閉戶默坐置筐於前諸物白盈見者喧於衆標遂立化繫髻金鉤至今存焉宋蒼山再光寺妙觀普瑞禪師榆城北鄉人也童時日記萬言因讀華嚴至若有如是如是思惟則有如是如是顯現處豁開心地後見皎淵月禪師印可南詔為造再光寺請師居焉師嘗夢與清涼賢首華嚴諸祖共語遂撰華嚴會玄記四十卷流通於世師雖印心於南宗而恆闡華嚴為業於水目山開講感金甲神人現身再光寺敷演陸地忽生蓮花如是瑞應不可殫述志謂師乃文殊後身也元蒼山念庵圓獲禪師大理人也因讀證道歌契入段氏稱為弘辨大師遊大方見中峰本和尚師初號無念峰以羅什捧鉢永嘉無念無生之旨扣之師曰我之無念異乎其所聞什師過在絶念不起永嘉過在任念自起二皆有念也我無念者心體靈之湛寂不動如鏡鑑像如燈顯物未嘗毫髮隱也惟洞徹法源者頗測未易與纏情縛識者語也峰深肯之為作無念字説并授三聚淨戒而歸廣録稱為護藏主焉師夢神授書法凡書字時右腕洞如水晶人號為玉腕禪師所著有磨鏡法并手書證道歌迹盛行於世元太華無照玄鑑首座莫詳姓氏與念庵禪師為友初為座主善講經論名著諸方未測教外別傳之旨遍遊天下廣涉兩宗之門初見高峰妙禪師為首座峰示寂師再見中峰本和尚復為第一座峰有云雲南鑑講主越萬八千里路來兩浙自相見至相別恰三年一日尋我客中夜話湖山間因舉宗門下數段陳爛葛藤不覺咬斷拇指臨別匆匆不欲徵其罪犯且放過一著有積劫塵勞忽吹盡黑龍潭下五更風之句師歸滇為梁王所重開太華山大弘祖道門弟子數百得師心印者五人及滅度王親至葬所全身奉塔於本山有行紀碑存焉附録中峰和尚聞師示寂遣侍者往祭之祭文云佛祖之道未易墜兮吾無照遠踰一萬八千里江山以來茲佛祖之道失所望兮吾無照負五十七春秋而云歸生耶死耶果離合兮非智眼而莫窺祖意教意果同異兮惟神心其了知謂無照於吾道有所悟兮真機歷掌其誰敢欺謂無照於吾道無所悟兮大方極目云胡不迷笑德山之焚疏鈔兮何取捨之紛馳鄙良遂之歸罷講兮徒此是而彼非惟吾無照總不然兮即名言與實相互融交涉而無虧出入兩宗大匠之門兮孰不歎美而稱奇屈指八載之相從兮靡有間其毫釐我閲人之既多兮如無照者非惟今少於古亦稀我不哀無照之亡兮哀祖道之既墜而今而後孰與扶顛而持危對爐薰於今夕兮與山川草木同懷絶世之悲也元雞足德存普通禪師趙州人也童稚出家遍遊講席講演大小乘因問中峰和尚於三乘十二分教明得與祖師意是同是別峰曰你舉教意來看師曰擬舉即差恁麼則汝講的經論聻師擬議峰便喝師不覺汗下因茲服膺峰為升座示法語有參玄上上人須識巧方便之句後結庵山中一日聞僧云水自石邊流出冷風從花裏過來香恍然開解元太華智福講主與蒼山道元為友二師雖弘經論而常慕南宗遊五臺聞鑑首座印心於中峰往參之峰一見便問座主何處人曰雲南講甚經論曰法華如何是佛法不現前曰即今現前了也曰現前底事如何曰不可以聲求色見曰座主大似會講經論師曰某甲到這裏一辭措不及峰於是示法語而歸并題庵名即心蓋取大梅見馬祖即心即佛義也福楚雄人元永昌人俱隱山不出有即心庵歌載中峰廣録明洱水道庵居士久參古庭和尚萬法歸一築室於水目九峰之問因聞水聲大悟再見古庭和尚庭一見便曰可喜居士這回穩坐家邦也居士曰某甲自來不出外師曰家中事若何士曰倒卻四壁師肯之士禮拜師有鐵壁銀山都放倒叮嚀珍重莫狐疑之句寄之年七十臨終説偈云貫用龜毛頻拈兔角今日分明趙州略彴此段在大巍之前元盤龍蓮峰崇照禪師晉寧人也姓段年十八禮雲峰和尚祝髮峰示與狗子佛性話每以七日斷絶思想疑之一日聞伐木聲忽大悟遂遊大方見空菴等一十八元善知識最後見中峰本和尚印可回滇建盤龍寺居焉元至正二十一年八月望詔衆書偈云三界與三途何佛祖不遊不破則便有能破則便無老僧有吞吐不下門徒不肯用心修切忌切忌跏趺而逝身體溫軟七日如生有彩虹貫天者三日至今肉身見在所建有六梵剎最崇麗焉附録南詔史載梁王宮中有怪左右啓王請師治之師祝畢怪息王喜禮謝留宮中夜分潛至榻前問國事師但嘆息不言王曰興敗乃天意師言何礙曰二十年後國亡矣至期大明兵下果應其言黑井有毒龍興水溢鹽井損民居師建寺書咒沉水害息寧州虎噬人師噀水限速去次日果去自是二地感師德每歲納貢耕牛引鹽永為常例明感通無極禪師大理人因參雲門拈世尊因緣悟入洪武十六年以白駒山茶進上上臨軒受之時駒忽嘶一聲茶亦發一花上異之加歎彌久敕賜建寺并御製詩一十八章而歸與金陵金碧峰千巖諸師友善咸有詩贈焉明古庭善堅禪師姓丁氏永樂甲午二月二十二日子時生於滇城南廓其夜紅光盈室異香彌戶七歲乞出家十歲入五華寺禮此宗和尚為師易名善賢十九年復禮白巖和尚改名善堅自是坐習不輟師異之勉持觀音號宣德二年巡按御史張公善相謂其師曰此子非凡間人年三十後當佩祖印爾老僧輩亦當加額後走金陵謁無隱和尚示萬法歸一話參之忽一日看圓覺經至身心俱幻處劃然自釋遂云離此身心誰當其幻返杭州戒檀受具足戒正統十年往金臺參無際和尚證明大事和尚大喜曰吾法自子大興於世賜號古庭將袈裟拂子付與汝作臨濟正眼先師慧命無令斷絶珍重珍重師暮年返滇建歸化禪林以弘治六年癸丑七月二十日未時集衆説偈云來從華藏海中來文殊普賢去從華藏海中去彌勒釋迦豎拂子云古今諸佛諸祖都在這裏不來不去咄放拂子瞑目而逝至今肉身如生所著有山雲水石集行於世明大巍淨倫禪師雲南昆明人姓康氏生宣德丁未正統丁巳年甫十一入學庚申出家受業本府太華無極泰和尚戊辰遂謁大方天順癸未參見古庭老和尚於浮山逮年六十有六説偈以別其徒所著有竹室集傳于世明波羅禪師大理人姓趙初居蒼山懸巖禮佛洞明心地後謁大方印心於古庭堅禪師復歸仍禮佛一日經行巖上屹然立化七日不踣鄉人以香燭之儀禱之輕如一葉遂就茶毗得舍利七粒瘞於浮圖後人名其壁曰波羅巖山勢巇嶮登者凜然風吹草木皆作禮佛聲至今不息所禮之石手足印紋恍然如生塔于蕩山蘭若猶存明雞足楊輔居士字存誠博學多聞隱居不仕壽八十餘無病化去家人以尸入棺營喪葬之頃忽見輔自外入拍手笑曰楊輔可喜今日大事了畢俄爾不見所著有桂樓集篆隸宗源行世中溪覺林居士李元陽生而穎悟過目成頌初得方士受導引之術以為神仙必致後因讀楞嚴經大駭曰世有如是書乎遂留心內典樂與僧遊自號覺林居士在翰院時常遊法席見雲谷法舟諸師與默菴定堂二僧為方外契所著有禪源記及中溪類稿等書流于世明雞足定堂本帖禪師尋甸人姓楊參萬法歸一臨終書偈云幾回力盡心圓處坐脫娘生鐵面皮即化去明朗目慧光本智禪師曲靖人姓李從本山白齋和尚落髮初遊方參不二遍融等八大善知識究竟大事其後乃登天目蘭風和尚之門以見佛了生死為問方擬説輒呵之一日風肩柴次遙見師擲柴於地曰見佛了生死師不言直肩柴去曰見佛了生死深契之後開堂於北京盧溝橋興復浮山刻九帶集當時大宰官如汪可受陶望齡王元翰等咸執弟子禮因與衆説楞嚴至同分別業二種妄見處忽下坐告衆曰緣盡矣跏趺而逝塔于浮山所著有法句行世應化邃古之世大理舊為澤國水多陸少有邪龍據之是名羅剎好啖食人居民鮮少有一老僧自西方來託言欲求片地藏修羅剎問何所欲僧身披袈裟手牽一犬指曰他無所求但欲吾袈裟一展犬一跳之地羅剎諾僧曰既承許諾合立符券羅剎又諾遂就洱水岸上畫券石間於是僧展袈裟縱犬一跳已盡羅剎之地羅剎倣徨失措意欲背盟僧以神力制之不敢背但問何以處我僧曰別有殊勝之居因於蒼山之上陽溪神化金屋寶所一區羅剎喜過望盡移其屬入焉而山遂閉于是僧乃鑿河尾泄水之半是為天生橋今洱水島上有赤文如古篆籀云是買地券僧即觀音大士也唐雞足古和尚不知何許人與二僧同住一庵入城乞食南詔問識何法門古答云我能使死者生極樂世界詔今國中但有死者請古起棺如此十餘年有讒於詔曰古妄人也云能超度死魂何所證驗臣願入棺試之詔如言請古起棺將至化骨之所起棺視之誠死矣懇古求生又作法遂蘇死者悔曰我已生在七寶宮殿中如何復來此古遂還舊庵見二僧問食二僧曰汝從城中來乃不裹糧卻至此欲食耶古遂走叩華首石門門訇中開二僧追呼至則石門閉矣二僧悔恨焚身門外焚處生柏二株有泣淚泉袈裟石存焉然古即守衣迦葉也唐白豬高娘大理有樵人每以食供山神神現身問何所求曰我欲到極樂一觀耳神曰此非我所能白巖有擔桶引豬女人汝往懇之彼能致汝極樂樵人尋之懇其所云女人以衣袖納樵人且戒勿語即見七寶宮殿池沼樹林皆如經説樵人忽思家不覺身居故地女人騎白豬化為象騰空而去乃知普賢菩薩化身也女生于高氏名谷女土人即其地建寺曰谷女今稱高娘谷鳥皆訛也唐蓮冠老僧首戴赤蓮花冠身披袈裟持鉢至蒙舍細農邏家乞食時農邏父子耕巍山下姑婦往餉見僧乞食遂食之再炊住饁僧坐不去持饁前行而僧業已先在復向人乞食姑婦驚怪又食之返而復炊且至巍山見僧坐石磐前有一青牛左有白馬右有白象各馴伏上覆雲氣雲中有二童子一執如意一執金鏡姑婦驚喜再拜之僧問何願二女不知僧曰奕業相承二女趨農邏等至則但見五色雲中一人持鉢而坐倣佛見二童子唯餘磐石上衣痕及象馬牛之迹耳楊波遠大士東漢時常以神異救世人號為神明大士數百歲出沒無時唐永徽以後常騎三角青牛逍遙以遊善觀風氣凡雲南鹽井寶處皆師所示偶逢神僧於三陽峰麓為設一供陳石案長丈六闊六尺但以一手持將石案猶存千夫莫舉後不知所終唐僧道清和尚者姓楊殉道忘軀日課經典感現觀音大士遐邇欽風漁者焚其網酒家隳其具蒙氏册為顯蜜融通大義法師一日微哂而化火中彩雲磐礡舌根不爛如紅蓮然唐趙迦羅師大德間昆明池有蛟化美少年妖異害人居民苦之師世精阿吒力教尤通梵經鄉父老禮請治之師即遣黑貌胡奴擒至以水噀之蛟立見形因斬之怪絶人問胡奴為誰曰此大黑天神也唐楊都司創洱河東羅筌寺寺前有田四十畝每栽秧約三日傭者戲師曰若能繫日當為畢栽師默念咒田栽既畢乃暝傭歸而後知已歷二晝矣山下有黑龍常作風浪覆舟師以白犬吠之龍怒而出師視龍猶蜒蚓若教誨之有頃龍馴俯而去先是河浪九疊師以念珠鞭之去其三疊河乃翕順可舟唐宗寶禪師者元和間有漁人於洱河岸得雕遺卵收之有頃卵破而出為嬰兒人異之不敢加害嬰兒能食即解種種伎倆長而為僧在崇模莊人呼為崇模師又曰宗寶能呼致風雨善用兵機神異莫測景莊帝禮以為師帝攻成都軍士乏糧師咒水為酒咒少為米醉飽數萬人唐師三至三敗者皆師力也後帝憚之師輒化為鵬飛集高興寺不知所終師摩矣太后乃景莊帝之母持觀音咒得觀音圓通隨帝征至羅浮白城建一寺南壁畫一龍是夜龍動幾損寺矣復畫柱鎖之方定唐贊陀高僧摩伽陀國人為蒙氏所重初遊鶴慶其地皆水師以杖刺東隅而泄焉復建玄化寺鎮之與李成眉友善時王公主崇聖寺祈佛至城西為乘白馬金甲神入攝去王告於師師曰此蒼山神也乃設燈照之果在蒼山下師怒欲作法移山於海神懼獻寶珠王從之周壽海法師洱海人有道行博通經史時天旱不雨王命師祈雨師曰昔湯旱七年六事自責天雨七日今王酒色妄殺天怒不雨王如悔改天雨自至何用禱為王如師言自改自責數日果雨宋無言和尚姓李氏精密教嘗持一鐵鉢入定欲晴則鉢內火光燭天遂霽欲雨則鉢中白氣上升遂雨南詔封為灌頂法師一日講法華經有老翁立聽畢乘風雲而去衆驚問之曰洱水龍也元連精和尚定遠人通瑜伽祕密教元至正間滇大旱梁王迎之祈雨師於淨瓶中出一小蛇雨大降王贈以金帛力辭歸之日役鬼荷擔步如行空不知所往師初隱處今名雲山焉漢觀音長者不知何許人蒙氏時遊大理長髯闊面冠蓮冠執杖持珠或隱或顯出沒不定後漢兵伐滇長者背負大石可約數丈兵士望見驚退兵中有善用陰符者盡令境中火息長者取石吹之得火民有憂患數處禱之皆應俗呼為觀音長者所負之石尚在取火之法今賴焉唐閣毗和尚神武王之弟也人馬十八騎往回數千里不過朝夕時唐師伐滇皆師破之後至西海人馬浮波而去莫知所從大義法師西竺人遊滇以菩提珠九子種鄯闡今存一株甚茂所譯有方廣經盛行梁智照法師深通大乘兼弘律部肅文帝禮以為師時帝興師犯梁師諫不止兩軍勝負殺戮甚多師撰封民三寶記以進之歸隱深山不復出元左黎國師滇西人也隨段氏朝元適元成宗手疽醫莫能治師咒水洗之即愈帝再欲試掘地窖使八人入地打鼓佯曰有怪命師治之師端坐少頃鼓聲不聞開視之八人已死帝深敬服封為國師夢語引豫半生虛度無論情封境閉不得出頭日顛倒於夢中即視聖太高視作聖太難亦迷惑於夢中更苦懵懵懂懂喚醒無人尤淪沒於夢中幸而機緣未斷崇禎丙子大士誕日遇吾滇徹庸禪師於金陵之興善寺謂豫生死事大須求菩提歸而胡猜亂度展轉弗寧更憧擾於夢中求師指示但推椅頓足曰再商量益雲霧於夢中至無可奈何田地徹公出所説夢語示豫紫閬陶公聞之亦出海門周先生證學録見贈猛力憤發細讀沉思越十日昧爽在枕豁然有悟咦原來今日即昨日新人是故人這推椅頓足的徹老漢絲毫瞞不得有甚麼再去商量且説師門良知極見成的不待致極完全的不必致物自沾他不上格無可格不知陽明夫子從何處下手來頓覺通身靈活本體工夫一齊俱了今而後讀無書書應無事事且可説無説法如是飢餐渴飲晝起夜眠何夢覺之關不了何聖賢之道不成耶於戲豫自夢自喚微獨徹公紫閬不能喚豫即諸佛菩薩與周先生不能喚豫然非徹公紫閬把我筌蹄何繇得此魚兔恐活佛出世周孔再生所接引我者亦不過是別無奧妙可傳也然後知徹公紫閬之善用棒喝具大慈悲心有大功德力起而頓首謝之書夢語之首賜進士第光祿寺寺丞前南京吏科給事中古滇戈允禮履卿父識雲山夢語摘要上明妙峰山夢庵釋周理撰武陵修齡楊鶴閲元起章自生民以來有人必有事有晝必有夜有寤必有寐有覺必有迷如是乃至夢想顛倒相待而起天地以晝為闢以夜為闔晝為陽夜為陰陽是人之覺時陰是人之睡時睡而形合覺而形開大則天地細則微塵乃至虛空有頂不能超於氣數之外夢體無來處無去處不於心生不於身生不從想生不從意識所生非世間非離世間非欲界非色界非無色界非染非淨非生非滅而有示現一切世間悉同如夢如夢無變異故如夢自性故如夢執著故如夢性離故如夢所現故如夢無差別故如夢想分別故如夢覺時故一切是夢夢無起處故至人無夢非有無之無夢也乃無無之無夢也謂夢覺恆一念想俱忘猶如晴天無雲萬象昭朗物物頭頭纖毫不昧魚之遊鳥之語皆是本色天然圓明虛活夢有返夢正夢順夢逆夢深夢淺夢延夢促夢借夢倚夢傳神夢托意夢想夢非想夢是自心靈明之所作非假神明主宰非假人力安排夢非有非無非亦有非亦無非生非滅一切俱非離於一切拘礙執著之心脫爾無思名曰真夢夢事有如波中月印有如暗中樹影有如空中鳥迹有如鷺鷥立雪有如錦上添花有如迅雷疾風有如倒影轉形有如圓珠繫彩有如窗外月白半明半暗之中似有非有之地恍焉惚焉一點精神出沒萬狀夢之一事最微最妙鮮有能徹其底蘊者縱三教祕典亦説不盡饒他至神至聖也只説得一邊不能全口道了蓋非不全口道了只是無下口處言思路絶語默難容世人日間擾擾夜夢沉沉只隨無明業識漂流如人在夢不知是夢既不知是夢安能明夢既不明夢安能悟夢既不悟夢安能了夢所以從劫至劫常在夢中我以念頭起處是夢亦是情邊事而實不能言夢之真所以然者前人説夢從想生者從意識起者從第八含藏識中流注者從內根外塵偶合處而有者從遊魂引識神而有者皆是不得已而鑽龜打瓦心思動而六塵現眉睫交而妄影生生前尚不識身中之主死後安能明夢裏之人三界外者身若琉璃心似虛空在劫火而不焚居阿鼻而無苦動徹光明舉措自在心頭受盡眼底情空達法性以無為悟涅槃而常樂思欲不生於三界依正高超於四生無名而人其為聖乎晝必作夜必寐作要心寧寐要神守作而心不寧如有氣之死人寐而神不守如不附尸之遊魂當夢者不知其夢譬如悟人不見空魚不見水牛不見雨人不見風其性情治者其夢寐不亂其心識融者其習氣不流娑婆世界土石諸山穢惡充滿人身卑小受用粗澀情沉貪欲積血氣以成身心沒愛河報分段而為質山澤障故目不能遠視虛空渺故耳不聞天聲壽命無過百年知識不逾隔日如一器中佇百蚊蚋啾啾亂鳴鼓發狂鬧不出方寸世界中間天地日月山河國土春夏秋冬此為最大者曰亦有窮乎曰有日月能照本須彌而不能照外世界山河國土能充此四海而不能遍外乾坤春夏秋冬能消長此方萬物而不能致極樂世界有盈虛故亦有窮也世以砒霜鴆糞草烏為毒苟誤投之即殺人無疑然善醫之者以之而瘥人疾此何也蓋得其用之法而已矣善知識用六情治衆生病亦復如是大智慧海中不可捨卻此物而不用故善於醫者能用毒為藥善於智者能轉識為性通乎晝夜之道質諸鬼神而無疑在意識清明耳意識清明自然前塵不能惑前塵不能惑一切時不昧此神明活計非大圓鏡智宗旨耳有所聽心有所念有念有心皆名外物與己不相似不能合體縱得合體不能忘機皆名障礙心與境相粗立時正如兩軍相持此處大不容易放過背境談心誰人不快學者工夫須從者裏查考萬境不來念時心似明了此非道也虛明妄想之根本睡著不作夢時心上無一物此非道也幽隱妄想之根本夢覺清寧六塵不擾時此非道也堅固妄想之根本夢中昏沉擾惑不能由人千牽萬引紛飛莫緒而省時似覺了無根才睡依然百出縱端座以待之不來然終不能頓淨經云諸修行人如澄濁水澄之雖清未去濁腳攪之復濁須知此外有上頭關夢覺不能入萬境不能惑者人心必私神心必正天心必公以去其所私存其所正故廓然太公人心見有可欲多被境轉神心直其所屈正如執物聖心空其所有無私無欲應化無物心如明鏡心如大海心如虛空心即天地在天地先天地從出皆名言也又曰無心無心則庶幾矣而果無心者即謗也雖然即心即佛最切近矣奈何眼中著屑者難免形影之疑吾意凡落音聲相貌者皆無心也噫安得其無心之人與之言心乎哉今人以情性為心者以六塵緣影為心者以昭昭靈靈應用不缺為心者以肉團為心者又以心配離配火者又以心喻猿喻蛇者如盲捫象各説一端平時工夫十分于生死際只得一二平時之心持到睡中又移換了平時做夢甚是明白到病中又改變了病中四大改常妖邪百出非見思惑塵沙惑無明惑盡淨者不能於忙中長往個中一靈物萬古無增減只因迷於事所以有推遷道人工夫成片世間心斷十二時中無一法可當情是虛間寂靜山河夢裏覺世界影中圓而已矣元神無擾衆念俱定當境無法者心之虛也心虛故前塵無礙所以見地非地見水非水夫夢覺齊觀身界混入者聖人也聖人之心空故夢亦空世上有最好的事都被忙者錯過了也聖賢有極妙之理都被愚者暗昧了也故絶天下之學無過一愚昧世間之通無過忙亂孔子曰發憤忘食豫謂急於道者如飢人得食而不著味夫人有飢而食者有不飢而食者不飢而食者志在味也飢而食者意在飽也在飢則一飽有餘在味則千方不足又曰樂以忘憂此樂非遂耳目口鼻之欲為然也夫憂從愛生愛自欲來佛言愛盡則苦盡故知生死貪愛為本世人之樂樂於情孔子之樂樂於心樂心者常樂情者亡道家以情為性授受之際只要七情不動觀張道陵傳趙升雲房授呂巖皆可見矣蓋老氏之道法自然而七情屬意根意根不起無識無知便是淪虛乃第六識主持未到第八阿賴耶識何況大圓鏡智儒者博文約禮便近佛之義性為佛在了世儒專治世而昧者目寂滅為斷滅錯認了也佛所説寂滅如謂萬物本間而人自鬧是也佛又説治世語言資生業等皆是佛法如此觀之自是治世者不了而出世間法統攝盡故常能安分守己自然諸惡不生常能虛間寂靜自然洞達古今觀三界如傳舍了萬物如漚生明生死如寤寐齊身世如光影惟識章神識無依遇物便寄如種子落地隨處生芽三界四生修羅外道皆所流處其生之時也若火燃泉達不可止遏隨所生處習業隨有諸天正樂修羅戰爭三途苦楚人道無明因集而生因散而滅是故我説諸法惟心諸法惟識凡物遇火則焚遇水則溺遇土則埋遇金則斷云何心識入火不焚入水不溺入土不埋入金不斷所以此物最堅最硬世無過者賢者之夢為智作愚者之夢乃識作故智作之夢雖夢猶覺也識作之夢雖覺亦夢也智夢如杲日識夢若螢光夫相去遠矣智人之夢如澄水雖流而未嘗濁蓋本清也愚人之夢如渾潭雖停而未嘗淨蓋本垢也凡分垢分淨畏生畏死者皆識也夫造善業者皆識而受苦報者亦識其有踐蛇虺而不加恐飲鴆毒而不生畏者蓋由識未發也識發由心生心生故有生死生死者乃識受非性無造作無損益無垢淨無增減無恐懼無欣厭隨緣飲啄一味平常斯性攝也非識達此者似人而天不見其淵若能轉物即同如來夫物其孰能轉乎哉皆物轉者也是故轉物則昌物轉則亡非聰明睿智其孰能當今稱釋迦誰不欲為之今稱堯舜誰不欲齊之然雖欲為而不能齊者蓋由無明也無明即識識即欲欲即凡情凡情非天理非天理故不齊萬象平平太虛寥寂不了惟心強自啾唧凡物起者我招也我惑者物役也物無自物我物之也我無自我物我之也是故智者役物而愚者物役禽中之大者惟鷗惟鵬獸中之大者惟魚惟龍人中之大者惟王惟臣世間之大者惟山惟海夫此皆未足為大也矣其最莫大者無過道故人達則大不達則小世之明者燈與燭也次更明者火與炬也其大明者日與月也故螢火之光不及燈燭之光燈燭之光不及日月之光日月之光千萬億倍不及佛光佛放光時無邊世界諸日月光明皆如聚墨世界中間幽暗之處日月光明所不能照而皆大明世之善能者皆能於物也未能於心夫能於心則無不能矣能於物則非能也嘗聞由基紀昌之射百步貫虱而不移蓋技也心猶未喻伊尹呂望之師千載遺風而不墜蓋道也德無不侔故心能即道技能即物能於道者通能於物者塞噫物於心也甚矣夫身榮而心未榮未足為榮心榮而身未榮斯榮也世以及耳目悅口體為榮夫斯情也乃業大害莫若是守清貧甘淡泊苦心節志為榮夫此道也乃智大貴莫若是是故榮於心者壽榮於情者夭榮於業者窮榮於道者通勿謂得於我何所益勿謂失於我何所損但增其欣厭之情耳是以至人不望德恆守貧抱其虛見得如失終日惟損損其所損復歸無極處世如駕虛舟過而不留到而不住此至人之境也至人之心與天地合故天如萬物如我心如一切如夢焉夫夢無心歟處大不得意之境其心晏如居甚榮遇之地其心淡如非平素操守到家物不能遷者不與也凡事覺於未然者寡悔于已然者衆昔季文子貴三思孔子云再斯愚云更加思上智者一思有重在季文則以三思豫則十思猶不足自古英雄得志皆從困厄中來自古聖賢得道皆從怕苦中來是故困不極志不發苦不極道不成不憤不起不悱不發其為如豫何無心者道之本也有念者識之根也識能生欲欲能亡我我既亡矣安能入道故善造道者在得無心無心則百非不生萬機齊備愛欲生於心如醍醐罐裏著鴆毒嗔怒發於念如清冷雲中霹靂火癡想萌於懷如太虛空中起黑雲宇宙中有最大利雖日親之而不能見者心也有最大害雖日避之而不能遠者欲也心本於象帝已前欲根於形色之初故象起於心身生於欲其源遠流長非聰明睿智不能當非英雄豪傑不能斷噫甚矣大雖猛虎熱鐵交橫於前猶甘心投焉故曰無敵心體原虛喪於實識性原有喪於無譬之火性從上水性自下識性喪而心珠圓心體實而識神勝是以聖人虛處令實實處還虛顛倒目前怡神曠劫有我受故憎愛從之而生毀譽自此而發做了個常戚戚之人無我所故生死無繇而作是非無地而興才是坦蕩蕩之士噫我之難忘者久矣非神悟於機先者不能當境無事意生章若要知死從何處去先須知生向何處來知夢覺底源便知生死去處知生死去處便永脫生死人只知閉眼夢而不知開眼亦夢只知形亡而死而不知身存亦死蓋生死是念也非關其形有形亡而神不亡者有神亡而形不亡者有神形都亡者有神形都不亡者是則形依神而有神假真心而有圓明真心中無夢無覺無生無死無生無不生雖終日生死而不見有生死之相是為神明是為遍知是為大覺覺破世間大夢故豫每寢時嘗查考這夢從何處起正思慮間忽然睡著即不繇我夢中昏昏惚惚似明白似不明白但一味只隨妄境牽引去者多矣若夢魂引不去白晝惑不得此人於道有少分相應學者工夫得力不得力須從夢中查考我初時作夢如以黑屋入黑屋後來作夢如走月下燈影中而今做夢如太虛空飛片浮雲工夫到一分夢境清一分世情重一分心境濁一分欲得夢覺無惑須大放下世情做到語不干之工夫欲得夢覺無惑須得一水清珠能清濁水然此珠非歷盡辛勤則大不容易豫嘗以睡覺後或清晨時或至晚臨睡時卻自打點此一夜所做的好夢歹夢此一日所為之惡事善事有功無功及一日兩日一月兩月所做之夢所為之事成甚邊事從幼至壯這半生前及無數生前所作所為成甚邊事近取諸身遠取諸物古今成敗盛衰欣悲苦樂成甚邊事後來無數劫無數生事又成甚邊事每到睡時將身心世界間非雜擾一切放下外境不侵內心自淨如水溶月如山住雲無一毫思議于其間則知天地如寄物我如化自家一個身心亦如夢中人也人之欲睡而竟睡不著者都是塵打攪睡著而夢境昏惚者亦是塵打攪人有生必有死生如寄客死如轉車父母妻兒如逆旅中人捨此就彼就彼捨此凡千百年中不知幾多捨而幾多取而不覺之晝必作夜必寐寐而復作自古及今而不覺之春之生物也必夏長夏長後秋收秋收又冬藏又復春生自古及今而不覺之世界之初成也而後住住而後壞壞而後空空又復成自古及今而不覺之人説至人無夢豫謂不謂無夢謂至人知夢知夢則無夢也不知則夢也昔者空生夜夢説六波羅密信相夢金鼓堯夢攀天而上湯夢及天而飴黃帝夢遊華胥孔子夢奠於兩楹皆無夢也法身無夢漏身有夢意生身無夢分段身有夢圓覺無夢緣覺有夢佛無夢菩薩有夢有囿夢者有知夢者有無夢者有了夢者囿夢者迷於夢也知夢者夢皆覺也無夢者覺亦夢也了夢者無覺覺夢無夢夢覺也古人言學道須識夢中人豫謂會得一夢字學道之能事畢矣善人行善所夢皆善不善人行不善所夢亦不善生者夢生而死者夢死皆念頭起也夢本無體隨心轉變有兩人同一夢而各事不同有人人異夢而其事一體有夢中雖吉而返兆於凶有最險之象而多應乎吉有一夢而十人所成各得一節有一人夢十事而全體備焉復有為此夢而轉及於彼或藉言指象而乖影露形或託物比興而隔越疏親大段窗外月明窗內白池邊花發水中紅是也心無三世夢有古今有夢十年者百年者有即夢即應者有夢一生二生無數生者有一劫二劫無數劫者所謂盡無邊劫總在一夢吉人做凶夢凶夢皆吉凶人做吉夢吉夢成凶故鄭獬夢頭生角為狀元魏延夢頭生角為刀下用甘羅占凶夢為吉周宣以妄夢符真伯嚭妄以凶原吉而終成凶鄭人解龍著衣為人襲國林環夢文淵送犬肉石頭夢與大鑑乘龜身提多伽尊者母夢日而生祖章懿皇后夢日而生帝劉幽求夢妻於寺兩夢符同宋理宗夢胡僧取殿二十年卒驗梁武帝夢獼猴升御榻果符其人六一居士夢石馬一耳張無垢侍郎夢咸陽景象婆羅門一睡夢經十生善慧五緣果證多劫事乃漸應夢以頓成一心之念變幻多方一夕之夢應于纍劫夢從想生境由心異念有誠妄夢有真假念如陽焰夢如空花念如飄風夢如舞葉念如晴空夢如湛水思出于位神現于境心不住內魂從外流忽幻忽真乍有乍無倏哀倏樂忽悲忽喜神無有方夢無有體心本無住境不定所有以外神交集內心而豫禍福者有內心昭明如水映物鏡寫形者有遊魂外奔而先兆後應者有陰陽不和而妄興妄見者有逃影避形而愈逐愈狂者有疑杌為鬼認繩作蛇者有妖假怪異遊先陰傳者有虛幻無記昏昏不實者有純真聖境授神授道者然則夢原不一變有多方念若不生夢本無寄原夢之心會夢之神知夢之人入夢之化夢體不流夢用遷變隨其變處皆真非守真而不化譬如太極生兩儀而四象八卦無中發有轉生轉變愈出愈多宮宮混入爻爻交參一卦之中渾圓大極一爻之內通攝諸卦夢有圓得者圓不得者世有云有頭無尾有尾無頭有中間無前後者皆不可圓豫謂更有從天中來生人者及八部三途中遞相出沒者所夢生前所夢生後皆不可解古以得惡夢即向東咒曰惡夢桃李好夢珠玉又以逐日地支所屬符禳之其惟周公解者太得其詳耳孫真人曰欲無惡夢莫食本命所屬肉莫起惡念莫啖五辛睡常以首觸東莫面壁豫謂善惡皆從心生知心則無惡夢欲無惡夢睡時大歇身心莫思前莫索後安心於無事遊神於無有當內外安隱側身吉祥而寢首不往東向西向意莫東想西想制心一處諸夢自然不生夢是念起不關形骸當禳於心莫禳於境心就是夢心就是符知心則知夢覺知夢覺則知禍福知生死知世間知出世間則知三界皆大夢也矣東萊以形接為事神遊為夢浮虛則夢陽沉實則夢溺寢藉則夢蛇寢衣則夢馬銜髮則夢馬將陰則夢水將晴則夢火將病則夢食將憂則夢舞古論亦如是説皆以陰陽五行定夢之吉凶都不理會心識變幻遊魂使然者蓋五行乃心識所附之塵心識是主五行之神心肝脾肺腎者陰陽造化所成之形也見聞覺知者本來所具之神也神能用於形形不能用神譬如機關木人有牽抽即動否則不能一切作用夢覺生死皆心識遷變而形色隨之論者須以心識形色圓和而説即當不然無因也邪因也陳希夷言先睡心後睡眼夢菴曰六根以心為主先放心睡則目自寧此意雖是但根本不寧者説個先睡心益見紛擾衛玠形神不接夢問樂令令答是想陽明睡著不做夢時云血氣障蔽夢菴曰形神不接夢非想也睡著不做夢非血氣障蔽也李卓説一切皆是夢鄧豁渠説夢是遊魂把識神到處引將去了此二人一得體一得用夢有異者謂或凶轉吉或吉成凶男夢作女女夢為男沙門夢加冠士夫夢鶴襒帝王夢著公卿衣公卿夢為帝王服乃至玉瓶耳碎木杖擊天又有夢入天宮龍宮鬼神宮地獄餓鬼之處禍福受授境變神遷纖毫不失雲山夢語摘要下明妙峰山夢菴釋周理著武陵修齡楊鶴閲問答章十四門無夢問人嘗説至人無夢而佛又夢周公孔子莊周武王又夢何也答不謂無夢只謂不知夢知夢者夢即覺也不知夢者覺即夢也夢固夢也夢覺一也若得無夢亦無有覺無覺無夢至人嘗夢故日卻來觀世間猶如夢中事不是無夢問何緣睡中有夢而又言至人無夢答有我故必有我之事晝作夜夢固然之理何得無耶然晝中所應作者當作之夜中所夢者亦夢之二皆不可止遏故曰夢即覺也問夢即覺何故晝中曾所不聞不見的事夢中皆見之及至醒來有符驗者有不符驗者何也答夢與覺只是一人非有二義只為覺屬形用事故有偏礙阻帶形到處見之形不到處不見之夢是神用事故神無方而夢無體能遠涉近遊見善見惡先世後因皆得知之剎那而生剎那而滅者總是念頭代識神起滅耳問我所作夢有驗不驗者何也答夢有三世又有百世謂現在過去未來有今生作往世夢者有今生作今生夢者有今生作來世夢者有夢十年者有夢百年者有夢一日一夜者有一人為十人夢者有十人為一人乃至千百人夢者有人為畜夢者畜為人夢者乃至四生六道遞相為夢者或近或遠或前或後情量卜度難盡知之凡有事必有夢有夢必有事先因後果後果先因如鏡現形纖毫不失問夢亦有不驗者否答若人妄心太甚念念不停見前所作得前忘後身心總若揚塵這等人夢與覺渾是箇妄心主持因妄極故皆無著落多有不驗問如古人言不夢不覺時血氣障蔽是否答如眼有不見明不見暗時是本色光明不勞心力不可喚作血氣障蔽天地收斂他説血氣只在形神上言指後天生滅法耳且如人死為鬼鬼亦有睡著不作夢者彼無血氣何不明了問夢中我形神作我之事理固宜之何有素不識面之人事亦入我境我為彼作夢者何也答有三義為有我故我之心體虛靈不昧如明鏡當臺諸所有物隨照隨見不可説言非我之事又有遊魂引識神到處去故又與彼往昔稍有因故如轉輪聖王夢中作蟻莊周夢蝶等意亦爾問夢覺是一云何覺時諸事皆實而夢中諸事皆虛乍幻親疏恍惚不定耶答汝只知夢中之事虛而不知覺時諸事亦虛汝當細審目生以來所作種種事業如今回心一照平生所得所失處盡成幻影無一可實何謂實耶問晝中作事有頭緒有始終一件了又一件云何夢中無根或有頭無尾或有中無兩邊幽幽隱隱不能自主者何也答晝中所作因有身故一切作用總係乎身八識一時具足夢中惟識神用事識隨念頭轉念頭起處即夢念頭滅處則無蓋為念頭無根緒而夢亦無根夢乃第六獨頭意識所起前之五識不能致夢問睡著不做夢時此心鶻鶻突突不能明了做夢之後能知之心在夢中明此二者中間何以我自不知去做夢及乎做出夢來才有知識有善惡雖然有知識善惡而又何自不知我在夢中答睡著不做夢時是四大休息精神閉合無明與識性混作一團所以無知識無境界一味蒙昧不覺耳做夢後從體起用先因意識牽引然後內根外塵一齊發動即有能見所見之境在夢而自不知夢者因外境界風飄蕩心海念念遷流神用于外譬如眼光只見其前不見其後由無始妄想虛偽習氣之所流轉故在夢而不知是夢生生滅滅無有窮已問將作夢時又不由身又不由心及諸靈覺主宰云何是中忽然抽出便成了夢事答此意如水生波空出雲石出火鍾出聲遍身是通身是出與不出其性無二一擊動處即火生時一念起處即夢生時不可説言何時抽出火光何時成了夢事問古人指睡著不作夢時為心之本體是否答睡著不做夢乃無明裏識情昏昧不辨耳東坡云若以頽然無知為佛地則貓兒狗兒得食飽睡腹搖鼻息無一毫思慮豈為貓兒狗兒亦佛耶人又以赤子之心不識不知為道豫謂此時更喚不得為道是情塵結伏於內不發泄耳涅槃云劫初時衆生煩惱未發故僧問古德云初生之兒還有六識也無曰如急水上打毬言其念不停也以此觀之睡著不做夢與赤子之心皆不是道人問李卓吾曰人之睡而夢也而視而聽而持而行而喜而怒何其不屬於我之目之耳之手之足之心乎卓吾曰夢中之人元不屬我之身矣古人有言曰生寄也蓋言人之神特寄於我之身耳惟其以身為寄故其謂死為歸客問豫曰若依此言生為寄死為歸則凡人都要死而後已夫人未嘗不死只要死得有頭向李氏所言死為歸及夢中之人不屬我之身者此意不然若作夢時人不屬我之身則其識已離軀殼必如死而已矣何其境雖在萬里外而齁鼾之息猶綿綿不絶耶然既有不絶者不可喚作全不屬我身矣又若以生為寄死為歸則必不樂于生而樂於死此生誠無用也大慧云生也只恁麼死也只恁麼經云是法住法位世間相常住何嘗以死為樂耶或曰人之睡中有夢自然之理但不須擬著他則吉亦不知凶亦不知道無許多疑忌而今説夢皆有事無不驗者使人有種種憂慮若得善夢必疑有好事不善必疑不祥而又多有不驗者則此疑心皆因是説而起曰余説此語特欲解人疑而汝反生疑耶夫夢與不夢俱不可得疑與不疑皆是自起豈關我説與不説乎且人之福與禍皆是自心所作苟知自心福來亦不欣禍至亦不懼故仲尼困於陳蔡而彈琴自若菩薩天龍恭敬而不以為喜若不知自心為不疑者為愚頑冥癡一味懵然度日不惟不知夢覺生死至於世事亦不知者也古德云大疑大悟小疑小悟不疑不悟只可知而不疑不可不知不疑悟而不疑無可疑者不知不疑昏昧不識問夢是眼做耶耳做耶乃至鼻舌身意做耶心做耶做夢時有我耶無我耶若無我而誰做若有我而胡不由我之身之心之意答夢是念起非關形關神非關鼻舌身意亦非關有我無我念起即夢念滅即無問若如是者全不關身形作用原來都是念頭既是念頭云何世間瞽者聾者啞者跛者亦皆有念也胡不能視不能聽不能言不能履耶答此業報於身者也雖色身有病而真性不壞是故瞽人多聰明啞人多念慮此蓋塞於四體而明在一根也問某嘗好打瞌睡昏沉比人重是何也答飲食多油鹽重思慮過身疲勞神不全故爾若節飲食薄滋味歇妄想安神魂自然不昏濁也問人有夜夢飲酒而覺哭泣夢哭泣而飲酒夢糞得財夢棺得官夢歌舞則有憂事者又有夢糞不應財夢棺不主官而別主者又有夢飲酒即得飲酒夢哭泣即得哭泣如是種種變幻何以夢同而事別耶答夢生于識情惑于計情所感處夢便相投情想雜均夢隨偏計故有應於此者彼者同者別者佛言三界惟心萬法惟識耳問晝所見物若山若海若人若物歷歷分明無纖毫過患云何夢中所見以有為無虛為實乍幻疏親恍惚不定何言夢與覺同一機軸耶答我説一機者謂境雖有夢覺而心本一靈蓋因心隨境轉被物所眩遂以有為無以虛為實然雖被物眩而真性亦不失壞楞嚴云如重睡人眠熟床枕其家有人于彼夢時搗練舂米其人夢中聞舂搗聲別作他物或為擊鼓或為撞鐘自怪其鍾為木石嚮於時忽寤遄知杵音自告家人我正睡時惑此舂音將為鼓響阿難是人夢中豈憶靜搖開閉通塞其形雖寐聞性不昏縱汝形銷命光遷後此性云何為汝銷滅以諸衆生從無始來循諸聲色逐念流轉若去生滅守于真常常光現前根塵識心應時銷落云何不成無上知覺問人言佛亦有夢今説佛無夢豈不相違乎答佛無夢非強言也夫地位菩薩且起煩惱滅煩惱二心了不可得況如來乎如來今者得妙空明覺山河大地有為習漏何當復生若言如來有夢者乃謗佛毀法也問佛作善慧童子時于普光佛所得五種奇夢如是種種經有明文何得言無答比皆因中也或為菩薩時示同凡夫作夢亦有之而果德中誠無夢夢乃想陰所作經云想陰盡者寤寐恆一雖聲聞小聖亦破想陰況如來乎佛實無夢問夢中有被人或打或辱之境將受未受之際恐懼交慌與白晝無殊及其受時十分不見有疼痛之象而又自知其事倏爾之項或轉為歡為笑今觀夢中光景與白晝全不相同何言夢覺一耶答一者心也由汝心念不一所以境有千差俄爾人辱我俄爾我辱人倏哀倏樂倏憂倏喜都由白晝心思所致見之於夢只是晝中有了形質室夢中惟思量執我之念所以不多覺疼痛者是無血軀也問鬼無血軀何故有濩湯爐炭寒冰等苦答鬼神雖無肉身而有業身所以有業故即有苦不得脫去問嘗聞人死後清氣歸天濁氣歸地一靈真性還乎太虛譬如一塊土把來作器用物壞之後依舊還土其理如何答此外道斷滅之見也彼因不知身從業生業從心起三世循環輪轉不息若無輪回報應則作善者為徒勞作惡者反得計何以故以性歸太虛善惡無徵處故彼亂臣賊子任肆惡於君父期一死幾於淪滅便同聖人之樂豈不便宜何貴學為也孔子云遊魂為變此正謂死而不亡者輪回報應之理昭然也而世人不察淪為斷滅膚見如此深為可笑客曰本是一幻夢卻如説幻説與人添出許多知見來也如我則不信夢曰在汝為不信是夢有乎曰有無都不信曰有無都不信是汝不信非關夢有無也而由汝不信必欲使盡天下人皆無夢可乎此義譬如孩稚自閉其目而怪日月無光若言雖有而為幻則幻本自幻也非幻而幻也然幻幻元幻非假幻而後幻幻性不有不可作無幻性不無不可作有故幻幻幻也非幻幻幻幻也有無且置即以目前言之凡有晝必有夜有寤必有寐胡為不信君不信者不信有晝作夜寐等事乎不信有天地日月乎不信有四時行百物生乎不信有父母兄弟六親乎穿衣吃飯亦不信有乎自家一箇身心塊然行宇宙問亦不信乎且此等事業森然在目朝朝夕夕日用所為去不得一毛若果不信此等皆有之則不信亦得矣苟離不得則覺與夢必然有之烏得不信如云穿衣吃飯一切都不信則與土木瓦石無異也何來對我語夢客不能加對而退問當持何念於生死長夜中不被夢寐所惑答若悟我心無我一切如夢無一真實即不被其惑以如夢解脫心十二時中觀照妄念不起即得也問四生六道遞相致夢何也答從因緣所生一切衆生從無始以來皆有父母六親自受識捨識後改形易報人死為畜畜死為人不復相知以熟習因緣故相致夢蓋夢為神遊能見先世後因而無障礙問所言六道互能入夢但能託夢于人者神人也人尚不能致夢況畜生乎答凡有生必有神神者無有不交通之理且無論六道即如畜生致夢人者亦多如宋元君之靈龜梁武帝之牲豕蛇銜珠而感夢鳥披素以求解奚謂不能問古人謂萬物之中惟人最靈此靈知之性畜生得之偏人得之正今能相致夢又言人死為畜畜死為人則無偏正之説也答天上天下四生六道有情無情皆具此靈知性只為業習有輕重故所感之報亦不等俱一性所生也何言有偏正耶且佛説十類三途人為十類中之一也十類者謂天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩㬋羅伽人非人此數種類各各有王臣眷屬各各飲食男女依報正報苦樂等事與人無別若以福壽快樂論之則吾人不如彼者猶多彼具神通光明飛行自在壽命萬歲衣食自然此之種類得正耶偏耶人死為畜畜死為人是彼衆生由妄習故迷失本明隨業灣環受諸苦報畜業滿而成人人業重而作畜如人被罪然罪畢則脫無一定之人亦無一定之畜且死此生彼之法如人乘車下一就一又如行客寄宿旅亭天明即速裝前途無久住理是故畜生與人皆報之優劣也非謂性地得偏得正問諸法皆因緣所生夢亦是因緣否答若無因緣即不成夢然夢有多種緣晝所作見之于夜緣識神緣心思緣意想緣五蘊六入十二處十八界二十五有皆是夢緣問夢有幾種答惟二種為根其餘皆是分枝列派所成問云何是二種答夢時夢醒時夢問睡著不做時主人在甚麼處曰還是做夢只是迷之太重耳所以昏昏惚惚不能明了曰若是做夢何不與醒時夢時同蓋醒時主人在醒時知夢時在夢中覺睡著不作夢何以懵然不辨耶或曰此亦迷也若素有守持者決不至此曰意識尚不分守持個甚麼其人無對余曰睡著不作夢與忽然睡著不由我同是一機軸蓋神機轉功處不容心意守持耳全在妙悟悟則自知不消問人問生與死皆是一夢未至生死之時亦有夢云何夢中去又復來至於死時此識何以一去即不回答業未滿故識不盡去所以去了又來若業已滿別報一身識移彼身而不來此如人住屋屋若不壞此人雖遠涉近遊還來歸家屋壞則別尋屋住不來歸也此理亦然問以何因緣能感後有答佛説有三因無明未斷故愛未棄故業未息故能感後有所以者何業為良田識為種子愛為溉灌無名無智無了無見之所覆蔽識便安住問人謂凡受胎時便是氣血無神識入中識在臨出胎時㘞地一聲始命之耳其理何如答若無神識則彼竭羅蘭遏蒲曇成死物也何以成胎而能運動生長乎㘞地一聲始來者乃外道邪因論喻如穀種若無穀性在中則出地時便麻麥也經云有福衆生處胎其樂或如天上或如人間其母安隱夢寐吉祥無福者在胎如受沸湯寒冰地獄菩薩人住胎如居淨土佛世尊住胎胎中悉能容受諸天神王所奉宮殿為諸菩薩説無量法門成熟無量衆生摩耶夫人謂我此腹中悉能容受三千大千世界而不迫礙言㘞地一聲始受識者有是理乎或者謂識有去後來先作主翁之説有前主者有後主者其理或然若謂後附者真無因也問中有形狀如何答如想夢者因晝所想見之於夢彼于無形中見諸形狀中有之身亦復如是當生地獄者彼中有身即如地獄乃至天道人道皆然又若以人道生天者其頭向上若生地獄餓鬼中者向下若畜生中生畜者如鳥橫飛問論中謂頂聖眼生天人心餓鬼腹之語言人之捨識之際熱向某處即生某道之義是乎答若論識則不求諸孔而出但熱向者乃衆生善惡業緣所感故捨識之時神從彼出有是義耳客問道家專以神自頂出使臨終之人端坐拱神是乎答鄧隱峰禪師臨終倒卓而化其神入地耶客無對豫曰只要見得真用得熟則逆順皆自在豈可任定頂門為事耶問圓澤見汲婦而托胎未死之身如何先有坐胎者非是偷胎奪舍乎曰若言奪舍則自不謂此孕懷三年等我也問若然甚麼在中作主曰因緣也識神也曰他身未死豈有識神入彼中乎曰識有去後來先作主翁若非彼之因則不先知也曰如是則一身有二主矣誰先誰後答經云三界惟心萬法惟識爭説得身在身亡識在不在二主三主問修行人臨終不得力何也答若真正修行者臨終永有不得力之理只恐認影子做活計與夫力量有所不充耳然非具道眼者莫能窺其涯涘有身即有苦豈可以呻吟疾病為不得道哉然則何以辨之曰病則病死則死在不亂耳然則以不亂為得道可乎曰亦未必然豫嘗見一屠人臨終分付家事別妻孥而逝故古德有云老僧後來自縊而死所謂非道眼莫能窺其涯涘問夢是佛法不答夢即佛法問經中雖説夢只將以喻法使人明了今言即夢是法全以虛幻不實之理以為佛法可乎答經云念念中以夢自在法門開悟世界海微塵數衆生豈不是夢即法乎以執著目前境界為實故以夢為虛幻殊不知目前有為之物全體不實而夢者當體覺性也豈可反謂虛妄不實乎問夢中多另是一山川者何耶答心性無依世界廣大夢中無形質室礙隨其去來故從來不到處到之不見之境見之問夢又多是舊景界者何故答良由貪著目前念念不捨故神識結縛此中不能遠離耳問夢既佛法如何修持答大慧教人先以目前景界都作夢觀然後以夢中光景移來覺時如此會得自然夢覺恆一問一切是夢則地獄天宮亦夢也善趣惡趣亦夢也心與識法亦夢也云何衆生於舍識受識之際不知不覺被所流轉雖入於地獄天堂亦不能自主者何也答愛欲所醉業力所牽顛倒所迷如醉酒人酒力所持不知為醉既不知是醉亦不知為醒長夜昏迷不覺爾問經言此三千大千世界咸釋迦所化之土而中何亦有非佛所化者如西域之六師此方之孔老及諸子皆不秉佛教答有二義一者謂法久成弊附佛法而各成異見二者謂隨方設教化儀不同諸大聖人殊形異相真俗雙融而度衆生論曰太昊乃應身大士仲尼即儒童菩薩皆佛化儀也問佛及老子皆有神通云何堯舜周孔不具神通答堯舜周孔乃應化聖人隨此方機宜故神通雖有而不論非不具也當時舜若無神通被象填於井而不能出孔子若無神通秦始皇伐冢而不豫知之蓋神通乃聖賢之餘事耳龍鬼妖魅皆悉具之佛法中只尚義勝不貴神通問夢是何物作用答黃櫱云一切衆生意緣走作於六道以天身入人身地獄身入餘身亦爾又如捨人屋入畜屋於畜屋入人屋亦爾生時性亦不來死時性亦不去皆虛妄想相之所流轉耳紀業豫初參禪時用功甚鋭一夕忽夢于幽澗中乘最大白象出平川後有百十人各執長鎗利器刺吾但其象高大不知幾十丈彼惟至膝耳竟不能奈何後至一門廣博無表豫乘象入彼皆齊門而退入已不知象之為我我之為象非覺非夢而醒豫作此夢語未及半而是夕稍倦就枕寢恍惚間夢遊一處若渚宮仙境然有小村落景物甚麗四顧不見人惟一病夫圍爐而坐貌甚憔悴若忍飢寒之狀豫憐之就坐與語復與食其人不納有傲然不忿之貌倏忽翻然成一壯士與人相歐而勝或聞傍語曰此人仙都客也因赴龍王請及此這愚夫不料其力與爭乃敗須臾又見一王者至從者極多壯士復若大臣然輔於左右王後又不知所之時豫在夢中亦知其為夢也攜拄杖而往又見其人獨坐於水濱巖穴之下若羽士形欠身要豫同坐乃問曰欲與師少論夢意得否豫曰喏若然師立義曰我與公俱在夢中也就以夢為題其人聯出數聯對意以屈豫豫答之無滯皆徵夢語也然不復記最後曰師出我對豫曰公立義曰就以師所坐石磴為題是夢不是夢速道速道豫應聲曰是夢不是夢于無有無中一點精靈出神出鬼其人良久不能答而退豫童時語音謇澀不明有老尊宿激勸禮觀世音菩薩從教虔禮三載夢一人報云接娘娘接娘娘二童女執香花于白衣婦人前有若將軍者擎方蓋于上入堂坐已授一六方沉香色小盒與豫其內有藥三丸皆六稜而鬱金色豫初嘗一丸始及唇齒通身如灌酥酪其香味遠徹非世所有覺已毛孔發香精唾如蜜自後發言無瘖塞之患也菩薩如此靈應故書以記之豫生來多病病中作夢多是平昔作事忽慢不加檢點去處有神人持一方簿云此是録誦經雜念者罪過余接已檢之果書誦經攙雜俗念人等姓字并罪過也然豫亦在末篇讀已甚凜然其人謂豫曰若一卷經攙雜兩箇念頭試思這一生來所誦經皆攙雜多少念頭忽然夢醒汗流浹背至此誦經必務至誠不妄矣豫嘗有慳習自為僧雖不作院主長老不蓄利養財物然微細習氣不覺不知處奚無誤犯忽夢遊曠野處其地多荊棘黑石見數十人形貌醜惡臥身于糞壤中大半有相識者一人高叫曰我因罪入此久矣師可為我寄一信豫曰汝家何處曰我與師同鄉住在施家莊夢覺已自思曰此非餓鬼乎與我同鄉則皆人也住施家莊則不布施而生彼中也自此發破慳習心如禪人有弟數詢豫出家然斯人氣度非沙門種也豫遮之以在家吃齋念佛即出家也不必在剃頭而禪人以為不然云和尚發願度盡衆生何為此人而閉卻願門耶遂度是夜其人自夢有三人立於殿堂相謂云又出家一人也此人沒一點善根怎麼吃得常住一人云不消我不與他吃便了乃以針逆刺其咽次日果患疾腹飢不下食自説其夢回俗則疾愈入則復作又一人求度入行者寮習彌陀經至七重行樹處夢有赤髮者以硃筆打一乂自後其人盡日不能記一偈而止豫嘗以怕死作念忽夜夢將死前有數十僧曰某師不在望和尚待一日豫問曰今日是甚麼日曰十四其次日衆又集身坐禪几一足橫跏一足垂下漸覺其身自下冷上見見麻木因衆苦索作辭世偈豫舉筆云諸法從心生是故説因緣因緣無所得故説心如幻遂有一人手執玉瓶曰此是甘露食之不迷豫抗聲曰以何迷我自覺彼中氣絶此處夢回其間光景古木叢巖大寺在中寺下即大路路下有小菴宛然在目是何説耶或謂是過去事或云未來豫曰非也因我有待心故有待事來惑我姚州了然公豫初會時長者也純誠好學問狗子因緣稍有省再三來列名為弟子豫謝而不允負笈雞山從遍和尚雉髮既而派列子上每見必推尊公避遜不已禮謝而言曰今生不克執中瓶於和尚座下矣願盡此朽骨作栽松道者故事由是攜闊一月後聞公訃至先一夜夢公遊西南城郭有人曰久候了然師到此赴齋不期一到即去松陰法會此不知何説也記之以待後云豫於病中夢偕數人行漸漸至窮巖削壁仰上視之不知幾萬丈於下亦然四面皆無路偶見一橋大如繩架於大山之巔下面波濤沸湧萬狀同伴咸懼而推豫前豫欣然過至半忽見山連橋澗一時播動吾亦忽生憂懼尋覺曰何有是幻妄之境忽然夢回還坐舊榻然惑不盡之所致也夢中見書名曰源流所載有老僧見赤蠖蟲死為誦觀音咒云咄咄咄咄項而見其蟲作人形入夢謝僧云某已轉為五臺山火頭四十年言畢沖霄而去夢中見蟲為人蟲謝僧于夢歷歷如鏡像水月重重分明豫與老僧似非為兩人復見其書末有云佛法靈應上度三界下救四生惟其心肯無不從願豫姊為尼號覺妙既亡矣豫因疾不能往但存心焉醫者治藥用少許酒為引一夕夢曰爾欲為功德何遽忘戒乎自思己行無虧或藥引一事耳從是誓志凡服藥寧死不用犯戒引子然亦見覺妙生平真實于淨土一念誠切堅久故有此感嗚呼為僧者于戒得不謹乎天啓初豫住水雲嘗蓄一雞司晨每齝食則以佛號呼之雖遠必至見僧誦經坐禪經行論道則環立左右而聽喈喈作聲若有所解者時余有妙峰之役相去數年一日復過其地衆僧迎余雞亦隨至啄啄有言如親故相適者及豫禮佛還環繞之侍者以杖逐而不去豫遽止之曰彼必有意何用爾驅時有客至豫對客坐雞忽近其前大鼓兩翼鳴一聲而化尸亦不踣衆大異之曰雞亦有是哉是日豫止不行以亡僧例送之及過妙峰守菴僧傳言雞冢生靈芝大如盤有異色未幾復夢謝云已生淨土矣豫生來業重咸蒙聖賢默祐故得消其瘖謇除其夙障今稍識字明經理者皆所賜之力也故以八大菩薩為依仗有盡於來劫誓度衆生之願一夕因夢坐於次諸聖形儀整肅動止安庠不自得而稱也然豫雖坐其次而諸聖自相語言豫皆不聞因啓曰既值聖座何以使我即斷煩惱而獲聖果乎有二聖以目顧我而微笑餘皆默然遂恍焉夢覺姚安知府李公諱自蕃初遊妙峰見奇巒疊秀林木森陰乃喜之曰真佛國仙都也及問豫出世旨大有歸嚮未幾公疾作邀豫歸公署謂曰一生為人全無半點著落今幸逢師得霑法誨若此病不起願為山門護法豫曰公生平剛正嫉惡鋤強護法固是常分但世間如幻生緑如風勿作此念宜善安隱俄而公卒寺僧數夢李知府來謁入佛殿指揮衆事遂立位事之響應如生崇禎辛未庭午妙峰雷電大作水勢滔天山嶽為之撼動一衆驚駭時洪衆禪人持鉢杖立豫前子問奚為曰龍作孽耳豫打一掌曰你見甚麼須臾水沒几案豫端坐不顧至瞑雨霽前後五十里壞山拔木不可甚計然唯寺宇及豫之靜室毫無損焉衆異之是夜夢一王者乘空而至為子求書書曰善德祠又夢一老姬引女子形儀妖冶將習近人豫呵之曰業障汝前生作孽今尚如此當斷汝頭言畢乎中忽有一劍而老姬與女子咸跪於前因為授戒而去自此境物清晏無復擾焉金陵友人邀豫遊天童然余雖聞天童久矣初不願見友人強以同行一夕夢與天童老人并一童子共舟遊於永深之池舟疾如風忽過一樓瞬夕百里又夢授一錫瓶插兩蓮花光色耀人下有無數小花及至天童景色人物宛如夢中無異豫遊天台日夜宿餘杭夢一偉男子訴云弟子因貪欲過分行於猥褻今報以醜形乞師懺悔言已慘然泣淚走入大石間見有黑繩縛此人於石上前後火燒覺已大異明日入城見錢塘門一人陰藏大過於身去住為之妨礙觀之則倣佛夢中人也因憶夢事乃語之曰汝前身以愛形故今感此形今以厭形故乃脫此形前後皆心也心何所之其人大悅以首觸地豫亦捨去數日再過此地聞其人斃矣
