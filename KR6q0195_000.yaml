front:
  text: 曹溪一滴緣起歲甲寅從家不退先生徹公和尚禮盤龍古庭兩肉身大士於昆明池上晉寧山中既知盤龍得法中峰因緣而古庭出世事僅存斷簡聞有山雲水石遺集為黃慎軒太史選訂朗目和尚較刻散佚不傳愴恍者數年逮辛酉得之友人架子上不啻夜光寶也甲子偕計遊明聖湖謀之石梁不退兩兄芟蕪點定梓於武林見者得未曾有謂我明楚石以來一人昨年徹公與家不退南來如善財五十三參語余曰吾欲為吾滇從前大善知識出些子氣余唯唯否否乃取所攜竹室集浮山法句摘其要者附焉一為得法古庭高足大巍所著一為朗目和尚所著皆浮山派也余題之曰曹溪一滴徹公謂余吾滇故稱佛國迦葉抱金襴袈裟入定華首待彌勒下生補佛處今雞山是法苑珠林載四天王答唐律師益州三塔等並有神異白古記載三皇之後西天摩竭陀國阿育王第八子蒙苴頌居大理為王三塔見存傳聞國初地震縫開復合益州即今大理郡是大藏有華嚴懸談會玄記為蒼山再光寺比丘普瑞集即妙觀禪師是此一滴水從鷲嶺來從曹溪來須向威音王那畔求之始得遂集禪宗應化諸聖賢崖略冠之篇端余曰公閲五燈有王荊公入大相國寺見諸方看經次問曰佛未出世時看甚麼經衆無語吳山端云相公周孔未出世時讀甚麼書然則曹溪未出世時這一滴水落在甚麼處徹公喝一喝豫曰木馬嘶風春意鬧泥牛嘯月百花香徹公法諱周理吾郡妙峰開山主家不退諱珽今任關中憲副石梁諱奭齡濟寧州守余不佞珙今南水部郎無學居士也崇禎九年丙子歲春三月上浣引曹溪一滴此滴雖源曹溪而自西自東自南自北華夷靈蠢瓦礫秕粳無不同具如魚種不同同吃一水只爭知味與不知味耳開口便啖不費氣力為知吞之噎之有物在喉非知美如甘露遍體融和為知一節不靈症候仍在非知這滴便足不必別飲為知飲著這箇又想那箇非知不離我口即見衆口為知知有我口分別衆口非知愈雋愈永舉無似處為知揣摩滋味羡彼曹溪非知飲了一滴溺出百千萬滴為知自謂已飲溺不出一滴非知祗園尼丘函谷三老子吾知味之父母也過去見在諸賢者吾知味之兄弟也未來諸賢者吾知味之子孫也夫豈惟知味者哉即一切不知味者皆吾之眷屬也吾滇知味如蒙苴頌妙觀盤龍古庭大巍朗目諸禪師近如妙峰徹公禪師不退無學兩居士及無住上人皆接曹溪嫡派可見人人能飲處處曹溪次而傳之期滴滴相承而已不肖允禮不知味者數十年忽被徹公一喝頓覺所謂知味不知味者如是徹公為之點頭因書於首以俟後之知味者賜進士第光祿寺寺丞前南京吏科給事中古滇戈允禮履卿父識
